apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
      color: blue
  template:
    metadata:
      labels:
        app: webapp
        color: blue
    spec:
      containers:
      - name: webapp
        # Deze image wordt straks door de pipeline gezet met 'kubectl set image'
        image: europe-west4-docker.pkg.dev/cloud-engineering-pcc/pcc-webapp/pcc-cluster-webapp:blue
        ports:
        - containerPort: 80
