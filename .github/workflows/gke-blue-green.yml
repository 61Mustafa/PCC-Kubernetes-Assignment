name: Build & Deploy (Blue/Green) to GKE

on:
  push:
    branches:
      - main
      - test

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  GAR_LOCATION: ${{ secrets.GKE_AR_ZONE }}          # e.g. europe-west4
  GAR_REPO: ${{ secrets.GKE_AR_REPO_NAME }}         # e.g. pcc-webapp
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  GKE_LOCATION: ${{ secrets.GKE_CLUSTER_ZONE }}     # zone OR region; keep consistent with your cluster type

  # Image name inside the repo (choose 1 and keep it consistent)
  IMAGE_NAME: pcc-cluster-webapp

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GKE_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev --quiet

      - name: Set IMAGE_TAG + DEPLOYMENT based on branch
        id: vars
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "IMAGE_TAG=blue" >> $GITHUB_ENV
            echo "K8S_OVERLAY=blue" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF_NAME}" == "test" ]]; then
            echo "IMAGE_TAG=green" >> $GITHUB_ENV
            echo "K8S_OVERLAY=green" >> $GITHUB_ENV
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

          echo "IMAGE=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$GAR_REPO/$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Build image
        run: |
          docker build -t "$IMAGE" -f Dockerfile .

      - name: Push image
        run: |
          docker push "$IMAGE"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to GKE (blue/green)
           run: |
             if [[ "$K8S_OVERLAY" == "blue" ]]; then
               kubectl apply -f k8s/deployment-blue.yaml
             else
               kubectl apply -f k8s/deployment-green.yaml
             fi

             # Inject the freshly built image into the running deployment
             kubectl set image deployment/webapp-${K8S_OVERLAY} webapp=$IMAGE

             # Switch the LoadBalancer selector to the active color
             kubectl patch service webapp \
               -p "{\"spec\":{\"selector\":{\"app\":\"webapp\",\"color\":\"${K8S_OVERLAY}\"}}}"

             kubectl apply -f k8s/service.yaml

             kubectl rollout status deployment/webapp-${K8S_OVERLAY} --timeout=120s || true
             kubectl get deploy,svc,pods -o wide
